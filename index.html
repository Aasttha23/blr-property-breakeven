<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Property Investment Simulator</title>
</head>
<body>
    <header>
        <h1>Property Investment Simulator</h1>
    </header>
    <main>
        <section id="property-input">
            <h2>Property Input Form</h2>
            <form id="input-form">
                <label for="property-value">Property Value:</label>
                <input type="number" id="property-value" required>
                <label for="down-payment">Down Payment:</label>
                <input type="number" id="down-payment" required>
                <label for="interest-rate">Interest Rate (%):</label>
                <input type="number" id="interest-rate" required>
                <button type="submit">Simulate Investment</button>
            </form>
        </section>
        <section id="investment-lifecycle">
            <h2>Investment Lifecycle Simulator</h2>
            <div id="lifecycle-output"></div>
        </section>
        <section id="results-engine">
            <h2>Results Engine</h2>
            <div id="results-output"></div>
        </section>
        <section id="deal-rating">
            <h2>Deal Rating</h2>
            <div id="deal-rating-output"></div>
        </section>
        <section id="credit-system">
            <h2>Credit System</h2>
            <div id="credit-output"></div>
        </section>
        <section id="payment-integration">
            <h2>Payment Integration with Razorpay</h2>
            <button id="pay-button">Pay Now</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
